# ---- Early Console (调试必需) ----
CONFIG_EARLY_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# ---- Wi-Fi + Networking ----
CONFIG_WIFI=y
CONFIG_WIFI_LOG_LEVEL_DBG=n
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_CONFIG_AUTO_INIT=n

# ---- DHCP Server (AP 模式下给客户端分配 IP) ----
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_DHCPV4_SERVER_LOG_LEVEL_DBG=n

# ---- CAN ----
CONFIG_CAN=y
# CONFIG_CAN_AUTO_BUS_OFF_RECOVERY removed in Zephyr 4.4

# ---- Logging ----
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y

# ---- JSON support ----
CONFIG_JSON_LIBRARY=y

# ---- Memory ----
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=65536

# ---- Shell (debug only, disable for production) ----
CONFIG_SHELL=n

# ---- Assert ----
CONFIG_ASSERT=y

# ---- Explicit main-thread scheduling ----
CONFIG_MAIN_THREAD_PRIORITY=5
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=1
